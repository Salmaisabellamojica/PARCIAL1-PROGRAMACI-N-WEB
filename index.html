<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Servicios Digitales</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.cs" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>

</head>

<body>

    <div class="container mt-4">

        <h1>Catálogo de Servicios Digitales</h1>

        <button id="modoBtn" class="btn btn-dark">Modo oscuro</button>

        <div class="row mt-4">

            <div class="col-md-4">

                <div class="card">

                    <div class="card-body">

                        <h5>Desarrollo Web</h5>

                        <p>Creación de páginas web profesionales</p>

                        <button class="btn btn-primary" onclick="solicitarServicio()">Solicitar servicio</button>

                    </div>

                </div>

            </div>


            <div class="col-md-4">

                <div class="card">

                    <div class="card-body">

                        <h5>Marketing Digital</h5>

                        <p>Campañas de marketing online</p>

                        <button class="btn btn-primary" onclick="solicitarServicio()">Solicitar servicio</button>

                    </div>

                </div>

            </div>

        </div>


        <h3 class="mt-5">Registro de Cliente</h3>

        <form id="formulario">

            <input type="text" id="nombre" placeholder="Nombre" class="form-control mb-2">

            <input type="text" id="correo" placeholder="Correo" class="form-control mb-2">

            <input type="text" id="telefono" placeholder="Teléfono" class="form-control mb-2">

            <button class="btn btn-success" onclick="registrar()">Registrar</button>

        </form>

    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</body>

</html>
